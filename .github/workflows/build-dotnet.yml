# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
env:
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - run: echo "The branch name is ${{ github.repository }}"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone mrploch-development (shared build config)
        run: git clone --depth 1 https://github.com/mrploch/mrploch-development.git ../mrploch-development
      - name: Clone ploch-common (project references)
        run: git clone https://github.com/mrploch/ploch-common.git ../ploch-common

      - name: Start SqlServer
        run: docker run --name sqlserver -e 'ACCEPT_EULA=Y' -e 'MSSQL_SA_PASSWORD=P@ssw0rd' -p 1401:1433 -d mcr.microsoft.com/mssql/server

      - name: Wait for SQL Server container
        uses: jakejarvis/wait-action@master
        with:
          time: '5s'

      - name: Copy documentation files
        run: |
          if [ -d "./DocumentationSite" ]; then
            cp ./README.md ./DocumentationSite/index.md
          else
            echo "DocumentationSite directory not found, skipping"
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      # For PR builds, embed the PR number and branch name in the prerelease tag
      # so packages are clearly identifiable (e.g. 3.1.1-pr.42.fix-serialization)
      - name: Configure PR package version
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          # Sanitize branch name for NuGet SemVer2 prerelease identifiers [a-zA-Z0-9-]
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-20 | sed 's/-$//')
          # Guard against empty or purely-numeric identifiers (invalid in SemVer2)
          if [ -z "$SANITIZED" ]; then
            SANITIZED="branch"
          fi
          if echo "$SANITIZED" | grep -Eq '^[0-9]+$'; then
            SANITIZED="b-${SANITIZED}"
          fi
          # Read current major.minor from NBGV
          CURRENT_VERSION=$(dotnet nbgv get-version --variable SimpleVersion)
          BASE=$(echo "$CURRENT_VERSION" | cut -d. -f1-2)
          # Override the prerelease tag to include PR number and branch name
          dotnet nbgv set-version "${BASE}-pr.${PR_NUMBER}.${SANITIZED}"
          # NBGV reads version.json from the committed git state, so we must
          # commit the change for it to take effect. This ephemeral commit is
          # never pushed — it only exists on the CI runner.
          git add version.json
          git -c user.name="ci" -c user.email="ci@ci" commit -m "ci: PR version" --no-verify
          COMPUTED=$(dotnet nbgv get-version --variable NuGetPackageVersion)
          echo "PR NuGet package version: $COMPUTED"

      - name: Install mono
        run: |
          sudo apt install -y ca-certificates gnupg
          sudo gpg --homedir /tmp --no-default-keyring --keyring /usr/share/keyrings/mono-official-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          echo "deb [signed-by=/usr/share/keyrings/mono-official-archive-keyring.gpg] https://download.mono-project.com/repo/ubuntu stable-focal main" | sudo tee /etc/apt/sources.list.d/mono-official-stable.list
          sudo apt update
          sudo apt install -y mono-devel
      - name: Add GitHub Packages Source
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: dotnet nuget list source --format short | grep -q github || dotnet nuget add source --username kploch --password "$GH_PACKAGES_TOKEN" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/mrploch/index.json"

      # Restore (UsePlochProjectReferences switches SampleApp from PackageReference to ProjectReference)
      - name: Restore dependencies
        run: dotnet restore ./Ploch.Data.slnx -p:UsePlochProjectReferences=true

      # SonarCloud setup (non-blocking)
      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner
        continue-on-error: true
      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage
      - name: SonarScanner Begin
        id: sonar-begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"${{ env.SONAR_PROJECT_KEY }}"
          /o:"${{ env.SONAR_ORGANIZATION }}"
          /d:sonar.login="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.projectBaseDir="${{ github.workspace }}"
          /d:sonar.scm.provider=git
          /d:sonar.cs.opencover.reportsPaths=**/CoverageResults/coverage.opencover.xml
          /d:sonar.coverage.exclusions="**/*.ps1,**/*.Tests/**,**/*.Tests.csproj,**/*.IntegrationTests/**,**/*.IntegrationTesting/**,**/samples/**"
          /d:sonar.exclusions="**/*.ps1,**/docs/**,**/DocumentationSite/**,**/*.md,**/workload-install.ps1,**/prepare-repo.ps1,**/.github/**,**/*.yml,**/*.yaml"
        continue-on-error: true

      # Build and Test (always runs regardless of SonarCloud status)
      - name: Build
        run: dotnet build ./Ploch.Data.slnx --no-restore -p:UsePlochProjectReferences=true
      - name: Test Coverage
        run: dotnet test ./Ploch.Data.slnx --verbosity normal --no-build --logger "trx;LogFileName=TestOutputResults.xml" /p:CollectCoverage=true /p:CoverletOutput=./CoverageResults/ "/p:CoverletOutputFormat=cobertura%2copencover" -p:UsePlochProjectReferences=true

      # SonarCloud end (runs even after test failures, only if begin succeeded)
      - name: SonarScanner End
        if: always() && steps.sonar-begin.outcome == 'success'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN"
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.xml
            **/TestResults/*.trx
      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            **/CoverageResults/*.xml

      # DocumentationSite is currently excluded from the solution (docfx incompatible with .NET 10).
      # Only deploy GitHub Pages if the _site output was actually produced.
      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' && hashFiles('DocumentationSite/_site/**') != '' }}
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./DocumentationSite/_site
      # Publish prerelease NuGet packages to GitHub Packages (main branch only)
      # Release packages are published to nuget.org via the release workflow
      - name: Publish NuGet packages to GitHub Packages
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          dotnet nuget push ./**/*.nupkg --source github --skip-duplicate -k "$GH_PACKAGES_TOKEN"
          dotnet nuget push ./**/*.snupkg --source github --skip-duplicate -k "$GH_PACKAGES_TOKEN" || true

      # Publish PR packages to GitHub Packages for testing/validation
      # PR packages include branch name in the prerelease tag (configured above)
      - name: Publish PR packages to GitHub Packages
        if: success() && github.event_name == 'pull_request'
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_PACKAGES_TOKEN" ]; then
            echo "::warning::GH_PACKAGES_TOKEN not available, skipping PR package publish"
            exit 0
          fi
          dotnet nuget push ./**/*.nupkg --source github --skip-duplicate -k "$GH_PACKAGES_TOKEN"
          dotnet nuget push ./**/*.snupkg --source github --skip-duplicate -k "$GH_PACKAGES_TOKEN" || true
