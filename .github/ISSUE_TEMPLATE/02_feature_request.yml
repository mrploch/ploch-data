name: Feature Request
description: Suggest a new feature or improvement for a Ploch.Data package.
title: "[Feature]: "
labels: [ "enhancement", "triage" ]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before you submit
      options:
        - label: I have searched [existing issues](https://github.com/mrploch/ploch-data/issues) and this has not been requested before.
          required: true

  - type: dropdown
    id: affected-package
    attributes:
      label: Related Package
      description: Which package would this feature belong to?
      options:
        - Ploch.Data.Model
        - Ploch.Data.EFCore (GenericRepository / Unit of Work)
        - Ploch.Data.EFCore.SqLite
        - Ploch.Data.EFCore.SqlServer
        - Ploch.Data.EFCore.IntegrationTesting
        - Ploch.Data.StandardDataSets
        - Ploch.Data.Utilities
        - New package
        - Not sure
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Focus on the problem, not the solution.
      placeholder: "I am trying to [...] but [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Include API shape, usage examples, or pseudocode if you have ideas.

  - type: textarea
    id: api-usage
    attributes:
      label: Example Usage
      description: How would the feature be used in code?
      render: csharp

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered? Why are they insufficient?

  - type: dropdown
    id: breaking-change
    attributes:
      label: Would this be a breaking change?
      description: Would this require changes to existing public API or behaviour?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, links to similar features in other libraries, etc.
