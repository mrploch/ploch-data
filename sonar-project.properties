# SonarCloud Configuration
# ========================
# Project key and organisation are passed via CI workflow environment variables.
# Token is passed via CLI /d:sonar.login from secrets.
#
# This file contains analysis configuration that is stable across environments.

sonar.host.url=https://sonarcloud.io
sonar.scm.provider=git

# Coverage report paths (OpenCover format from Coverlet)
sonar.cs.opencover.reportsPaths=**/CoverageResults/coverage.opencover.xml

# ---------------------------------------------------------------------------
# Source exclusions — files excluded from code analysis entirely
# ---------------------------------------------------------------------------
# Test projects: different coding standards, not production code
# Migrations: auto-generated by EF Core
# Scripts, docs, CI config: not source code
sonar.exclusions=\
  **/tests/**,\
  **/*.Tests/**,\
  **/*.IntegrationTests/**,\
  **/*.IntegrationTesting/**,\
  **/Migrations/**,\
  **/*.ps1,\
  **/docs/**,\
  **/DocumentationSite/**,\
  **/*.md,\
  **/.github/**,\
  **/*.yml,\
  **/*.yaml

# ---------------------------------------------------------------------------
# Coverage exclusions — files excluded from coverage measurement
# ---------------------------------------------------------------------------
# Test code should not be measured for its own coverage.
# Samples are demo code and not part of the library's coverage target.
sonar.coverage.exclusions=\
  **/tests/**,\
  **/*.Tests/**,\
  **/*.IntegrationTests/**,\
  **/*.IntegrationTesting/**,\
  **/samples/**,\
  **/*.ps1
